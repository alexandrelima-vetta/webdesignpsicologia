  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-gold: #c8a24a;\n}\n*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}\nhtml{scroll-behavior:smooth}\nbody{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;cursor:none}\n\n/* ── CURSOR ── */\n#cur-dot{position:fixed;width:5px;height:5px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:opacity .2s}\n#cur-ring{position:fixed;width:38px;height:38px;border:1.5px solid rgba(78,184,176,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s,border-color .25s,opacity .2s}\n.cursor-hover #cur-ring{width:60px;height:60px;border-color:var(--accent)}\n\n/* ── NAV ── */\nnav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:28px 64px;transition:padding .4s ease,background .4s ease,backdrop-filter .4s ease,border-color .4s ease;border-bottom:1px solid transparent}\nnav.scrolled{padding:16px 64px;background:rgba(7,9,15,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom-color:var(--border)}\n.nav-logo{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--text);letter-spacing:.2px;text-decoration:none}\n.nav-logo em{font-style:italic;color:var(--accent)}\n.nav-links{display:flex;gap:40px;list-style:none;align-items:center}\n.nav-links a{font-size:13px;font-weight:400;color:var(--muted);text-decoration:none;letter-spacing:.3px;transition:color .2s}\n.nav-links a:hover{color:var(--text)}\n.nav-cta{border:1px solid rgba(78,184,176,.35) !important;color:var(--accent) !important;padding:9px 24px;border-radius:100px;font-weight:500 !important;transition:all .25s !important}\n.nav-cta:hover{background:var(--accent) !important;color:var(--bg) !important;border-color:var(--accent) !important}\n\n/* ── HAMBURGER ── */\n.nav-ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:none;padding:4px}\n.nav-ham span{display:block;width:22px;height:1.5px;background:var(--muted);transition:all .3s}\n.mob-menu{display:none;position:fixed;inset:0;background:rgba(7,9,15,.97);backdrop-filter:blur(24px);z-index:199;flex-direction:column;align-items:center;justify-content:center;gap:36px}\n.mob-menu.open{display:flex}\n.mob-menu a{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--text);text-decoration:none;transition:color .2s}\n.mob-menu a:hover{color:var(--accent)}\n.mob-close{position:absolute;top:28px;right:32px;background:none;border:none;color:var(--muted);font-size:24px;cursor:none;line-height:1}\n\n/* ── HERO ── */\n.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding:0 64px}\n\n/* Mesh blobs */\n.mesh{position:absolute;inset:0;z-index:0}\n.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.28}\n.b1{width:800px;height:800px;background:radial-gradient(circle,#0e4a58,transparent 65%);top:-250px;right:-150px;animation:b1m 16s ease-in-out infinite}\n.b2{width:550px;height:550px;background:radial-gradient(circle,#5c3d10,transparent 65%);bottom:-180px;left:-120px;animation:b2m 20s ease-in-out infinite}\n.b3{width:420px;height:420px;background:radial-gradient(circle,#0e2840,transparent 65%);top:40%;left:25%;animation:b3m 25s ease-in-out infinite}\n@keyframes b1m{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(70px,50px) scale(1.1)}66%{transform:translate(-50px,90px) scale(.94)}}\n@keyframes b2m{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(90px,-70px) scale(1.12)}70%{transform:translate(-30px,40px) scale(.9)}}\n@keyframes b3m{0%,100%{transform:translate(0,0)}50%{transform:translate(-90px,-50px)}}\n\n/* noise */\n.noise-layer{position:absolute;inset:0;z-index:1;opacity:.025;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\");background-size:256px}\n\n.hero-content{position:relative;z-index:10;max-width:700px}\n.eyebrow{display:inline-flex;align-items:center;gap:12px;margin-bottom:36px;opacity:0;transform:translateY(18px);animation:rise .8s .15s forwards}\n.eyebrow-line{width:36px;height:1px;background:var(--accent)}\n.eyebrow-txt{font-size:10px;font-weight:500;letter-spacing:3.5px;text-transform:uppercase;color:var(--accent)}\n\n.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(54px,6.5vw,96px);font-weight:300;line-height:1.04;letter-spacing:-1.5px;color:var(--text);margin-bottom:32px}\n.word{display:inline-block;opacity:0;transform:translateY(44px)}\n.hero h1 em{font-style:italic;font-weight:300;background:linear-gradient(130deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.h1-line1{display:inline-block;white-space:nowrap;opacity:0;transform:translateY(36px);animation:rise .8s .5s cubic-bezier(.16,1,.3,1) forwards}\n.h1-accent{display:inline-block;opacity:0;transform:translateY(36px);animation:rise .8s .85s cubic-bezier(.16,1,.3,1) forwards;font-style:italic;font-size:1.08em;letter-spacing:-.5px;background:linear-gradient(130deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n\n.hero-sub{font-size:16px;font-weight:300;color:var(--muted);line-height:1.8;max-width:500px;margin-bottom:52px;opacity:0;animation:rise .8s 1.3s forwards;min-height:3.6em}\n.type-cursor{display:inline-block;width:2px;height:.85em;background:var(--accent);margin-left:2px;animation:blink .7s step-end infinite;vertical-align:-.05em}\n@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}\n\n.hero-btns{display:flex;gap:18px;align-items:center;flex-wrap:wrap;opacity:0;animation:rise .8s 1.7s forwards}\n\n.btn-main{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:var(--bg);padding:16px 38px;border-radius:100px;font-size:14px;font-weight:600;text-decoration:none;transition:transform .3s,box-shadow .3s;position:relative;overflow:hidden}\n.btn-main::after{content:'';position:absolute;inset:0;border-radius:100px;background:var(--gold);opacity:0;transition:opacity .3s}\n.btn-main:hover::after{opacity:1}\n.btn-main span,.btn-main svg{position:relative;z-index:1}\n.btn-main:hover{box-shadow:0 20px 50px rgba(78,184,176,.22)}\n.btn-ghost{display:inline-flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;font-weight:400;text-decoration:none;transition:color .2s}\n.btn-ghost:hover{color:var(--text)}\n.btn-ghost-arr{width:34px;height:34px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:14px}\n.btn-ghost:hover .btn-ghost-arr{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.04)}\n\n/* Decorative ψ */\n.hero-psi{position:absolute;right:64px;top:50%;transform:translateY(-50%);z-index:5;pointer-events:none;will-change:transform}\n.psi-giant{font-family:'Cormorant Garamond',serif;font-size:clamp(200px,26vw,420px);font-weight:300;font-style:italic;color:transparent;-webkit-text-stroke:1px rgba(78,184,176,.12);line-height:1;user-select:none;animation:floatPsi 11s ease-in-out infinite}\n@keyframes floatPsi{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-22px) rotate(-4deg)}}\n\n/* Scroll hint */\n.scroll-hint{position:absolute;bottom:40px;left:64px;z-index:10;display:flex;align-items:center;gap:14px;opacity:0;animation:rise .8s 2.1s forwards}\n.scroll-line{width:48px;height:1px;background:var(--border);overflow:hidden;position:relative}\n.scroll-line::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--accent);animation:scanLine 2s 2.5s ease-in-out infinite}\n@keyframes scanLine{0%{left:-100%}100%{left:100%}}\n.scroll-txt{font-size:10px;letter-spacing:3.5px;text-transform:uppercase;color:var(--muted)}\n\n@keyframes rise{to{opacity:1;transform:translateY(0)}}\n\n/* ── STRIP TICKER ── */\n.strip{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow:hidden;padding:13px 0}\n.strip-track{display:flex;width:max-content;animation:tick 28s linear infinite}\n.strip-track:hover{animation-play-state:paused}\n@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}\n.s-item{display:flex;align-items:center;gap:10px;padding:0 48px;white-space:nowrap;font-size:11px;font-weight:400;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)}\n.s-sep{color:var(--accent);font-size:14px;opacity:.7;margin-left:-24px}\n\n/* ── SECTION COMMON ── */\n.sec{padding:120px 64px;position:relative}\n\n.lbl{display:inline-flex;align-items:center;gap:12px;margin-bottom:18px}\n.lbl-line{width:28px;height:1px;background:var(--accent)}\n.lbl-txt{font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--accent)}\n\nh2.stitle{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,4vw,60px);font-weight:300;line-height:1.1;letter-spacing:-.5px;color:var(--text);margin-bottom:64px}\nh2.stitle em{font-style:italic;background:linear-gradient(130deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n\n/* ── DIFERENCIAIS ── */\n.dif-sec{background:var(--bg2)}\n.dif-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}\n.dif-card{background:var(--bg2);padding:52px 44px;position:relative;overflow:hidden;transition:background .35s}\n.dif-card:hover{background:rgba(78,184,176,.035)}\n.dif-num{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;color:rgba(255,255,255,.03);line-height:1;position:absolute;top:20px;right:28px;user-select
